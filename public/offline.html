<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprouts Academy Quiz Builder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        color: #1f2937;
        padding: 24px;
      }

      main {
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Sprouts Academy Quiz Builder can stay installed on your device, but AI quiz generation still needs an internet connection.</p>
      <p>Reconnect to generate new worksheets or reopen any quizzes already saved in your browser.</p>
    </main>
  </body>
 </html>
